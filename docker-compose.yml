services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: emotion-ai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: emotion_ai
      MYSQL_USER: emotion_ai
      MYSQL_PASSWORD: emotion_ai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: emotion-ai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion-ai-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=emotion_ai
      - MYSQL_PASSWORD=emotion_ai_password
      - MYSQL_DATABASE=emotion_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_PROVIDER=mock
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # 前端Web
  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: emotion-ai-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: emotion-ai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web

volumes:
  mysql_data:
  redis_data:

networks:
  default:
    name: emotion-ai-network