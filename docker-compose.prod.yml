# emotion-ai-assistant 生产环境配置 v2.0
# 包含完整的安全配置、资源限制和高可用设置
# 使用方法: docker-compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # MySQL数据库 - 资源限制 & 安全加固
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: emotion-ai-mysql
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 安全配置
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-emotion_ai}
      MYSQL_USER: ${MYSQL_USER:-emotion_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    tmpfs:
      - /tmp:mode=1777
      - /var/run/mysqld:mode=1777
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --max-connect-errors=1000
      --skip-name-resolve
    # 健康检查
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - emotion-ai-network

  # ============================================
  # Redis缓存 - 资源限制 & 安全加固
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: emotion-ai-redis
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 768mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - emotion-ai-network

  # ============================================
  # MinIO对象存储 - 资源限制 & 安全加固
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: emotion-ai-minio
    restart: unless-stopped
    # 以 root 用户运行以创建必要目录
    user: "0:0"
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - emotion-ai-network

  # ============================================
  # 后端API服务 - 资源限制 & 安全加固
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple/}
    container_name: emotion-ai-backend
    restart: unless-stopped
    # 加载环境变量文件
    env_file:
      - ./backend/.env.docker
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 安全配置
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-emotion_ai}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-emotion_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - uploads_data:/app/uploads
    # 服务依赖 - 仅等待服务启动，不等待健康检查
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - emotion-ai-network

  # ============================================
  # Nginx反向代理 - 资源限制 & 安全加固
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: emotion-ai-nginx
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
    ports:
      - "${HTTP_PORT:-8080}:80"
      # HTTPS 端口默认禁用，如果需要请在 .env 中设置 HTTPS_PORT
    volumes:
      - ./frontend/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/web/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - ./deploy/ssl:/etc/nginx/ssl:ro
    # 服务依赖 - 仅等待服务启动
    depends_on:
      backend:
        condition: service_started
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - emotion-ai-network

# ============================================
# 数据卷定义 - 支持本地持久化
# ============================================
volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/mysql
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/redis
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/minio
  uploads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/uploads
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/logs/nginx

# ============================================
# 网络配置 - 隔离网络
# ============================================
networks:
  emotion-ai-network:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
