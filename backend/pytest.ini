[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=app --cov-report=term --cov-report=html:reports/coverage --html=reports/test_report.html --self-contained-html
asyncio_mode = auto
markers =
    performance: 性能测试
    compatibility: 兼容性测试
    smoke: 冒烟测试
    api: API接口测试
    unit: 单元测试
    integration: 集成测试
