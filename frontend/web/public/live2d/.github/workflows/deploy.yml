name: Deploy
on:
  push: # 监听调用时机为push事件
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest # runs-on 指定job任务运行所需要的虚拟机环境(必填字段)
    steps:
      - name: 拉取代码 # 步骤名字
        uses: actions/checkout@master # 使用 actions/checkout 库拉取最新源码

      - name: 部署产物到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: models/
          target: ~/Projects/.l2d_models/
          rm: true
          strip_components: 1

      - name: 执行远程脚本命令
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p ~/Projects/l2d_models
            rm -rf ~/Projects/l2d_models/*
            cp -rf ~/Projects/.l2d_models/*  ~/Projects/l2d_models/
            rm -rf ~/Projects/.l2d_models
