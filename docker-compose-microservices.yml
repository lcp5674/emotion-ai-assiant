# emotion-ai-assistant 微服务架构配置 v2.0
# 适用于大规模生产环境，支持服务独立扩展
# 使用方法: docker-compose -f docker-compose-microservices.yml up -d

version: '3.8'

networks:
  emotion-ai-network:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  backend-data:
    driver: local

services:
  # ============================================
  # API网关服务
  # ============================================
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-emotion_ai}:${MYSQL_PASSWORD:-emotion_ai}@mysql:3306/${MYSQL_DATABASE:-emotion_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
    volumes:
      - backend-data:/app
    networks:
      - emotion-ai-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # 认证服务
  # ============================================
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "8001:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - SERVICE_NAME=auth
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-emotion_ai}:${MYSQL_PASSWORD:-emotion_ai}@mysql:3306/${MYSQL_DATABASE:-emotion_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
    volumes:
      - backend-data:/app
    networks:
      - emotion-ai-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # 聊天服务
  # ============================================
  chat-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "8002:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - SERVICE_NAME=chat
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-emotion_ai}:${MYSQL_PASSWORD:-emotion_ai}@mysql:3306/${MYSQL_DATABASE:-emotion_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
    volumes:
      - backend-data:/app
    networks:
      - emotion-ai-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # 会员服务
  # ============================================
  member-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: member-service
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "8003:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - SERVICE_NAME=member
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-emotion_ai}:${MYSQL_PASSWORD:-emotion_ai}@mysql:3306/${MYSQL_DATABASE:-emotion_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - WECHAT_PAY_ENABLED=${WECHAT_PAY_ENABLED:-false}
      - WECHAT_MCHID=${WECHAT_MCHID:-}
      - WECHAT_SERIAL_NO=${WECHAT_SERIAL_NO:-}
      - WECHAT_PRIVATE_KEY_PATH=${WECHAT_PRIVATE_KEY_PATH:-}
      - WECHAT_APIV3_KEY=${WECHAT_APIV3_KEY:-}
      - WECHAT_APPID=${WECHAT_APPID:-}
      - WECHAT_NOTIFY_URL=${WECHAT_NOTIFY_URL:-}
    volumes:
      - backend-data:/app
    networks:
      - emotion-ai-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # 数据库服务
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-emotion_ai}
      - MYSQL_USER=${MYSQL_USER:-emotion_ai}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - emotion-ai-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --skip-name-resolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================
  # Redis服务
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - emotion-ai-network
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 768mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # Prometheus监控
  # ============================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - emotion-ai-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # Grafana可视化
  # ============================================
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    user: "472:472"
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - emotion-ai-network
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # 前端服务
  # ============================================
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
    ports:
      - "3000:80"
    environment:
      - API_BASE_URL=http://api-gateway:8000
    volumes:
      - ./frontend/web:/app:ro
    networks:
      - emotion-ai-network
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
