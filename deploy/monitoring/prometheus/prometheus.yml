global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 监控Prometheus自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控主机指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # 监控MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
    # 如需更详细的MySQL监控，需要部署mysqld_exporter

  # 监控Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    # 如需更详细的Redis监控，需要部署redis_exporter

  # 监控后端服务
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # 监控Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    # 需要配置Nginx stub_status模块

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093
